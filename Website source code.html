<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사랑하는 내 손자에게</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="letter-container">
        <!-- 1. 헤더 (제목) -->
        <header>
            <h1>사랑하는 손자에게 남기는 이야기</h1>
            <p class="date">2026년 어느 좋은 날에</p>
        </header>

        <!-- 2. 본문 (좋은 말 / 메시지) -->
        <main class="letter-content">
            <p>네가 자라면서 마주할 수많은 날들에 이 글이 작은 힘이 되기를 바란다.</p>
            
            <blockquote>
                "실패를 두려워하지 말고, 네가 가진 논리와 창의력을 믿고 나아가거라. 
                너는 이미 충분히 멋지고 지혜로운 아이란다."
            </blockquote>

            <p>언제나 네 뒤에서 묵묵히 응원하는 사람이 있다는 것을 기억해라.</p>
        </main>

        <!-- 3. 푸터 (할아버지의 서명) -->
        <footer>
            <p>너를 무척이나 사랑하는 <strong>할아버지가</strong></p>
        </footer>
    </div>

</body>
</html>
